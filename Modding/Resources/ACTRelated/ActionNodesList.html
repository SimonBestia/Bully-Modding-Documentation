      window.switchTab = function(evt, tabName) {
        // Find the parent container
        const container = evt.currentTarget.closest('.code-tabs');
        
        // Hide only this container's tab content
        container.querySelectorAll(".code-content").forEach(content => {
          content.classList.remove("active");
        });

        // Deactivate only this container's tab buttons
        container.querySelectorAll(".tab-btn").forEach(btn => {
          btn.classList.remove("active");
        });

        // Show the specific tab content
        document.getElementById(tabName).classList.add("active");

        // Activate the button
        evt.currentTarget.classList.add("active");
      };

      document.addEventListener('DOMContentLoaded', () => {
        const target = document.querySelector('section.content');
        target.innerHTML = document.getElementById('preloaded-content').innerHTML;

        // Strip indentation from <pre> tags
        target.querySelectorAll('pre').forEach(pre => {
          const lines = pre.textContent.split('\n');

          // Remove first and last empty lines if they exist
          if (lines[0].trim() === '') lines.shift();
          if (lines.length > 0 && lines[lines.length - 1].trim() === '') lines.pop();

          // Find indentation of the first non-empty line
          const firstLine = lines.find(line => line.trim() !== '');
          if (!firstLine) return;
          const prefix = firstLine.match(/^\s*/)[0];
          const prefixLen = prefix.length;

          if (prefixLen > 0) {
             pre.textContent = lines.map(line => {
                if (line.startsWith(prefix)) {
                   return line.slice(prefixLen);
                }
                return line; 
             }).join('\n');
          }
        });
      });
      

    </script>

      <hr />
      <h2>What is an Action Node?</h2>
      <div style="float:left">
        <p>Arguably the most popular thing the modding community likes to mess with.</p>
        <p>In <strong>BULLY</strong>, just like many other games, characters (and even props) have a wide array of actions that can be performed.<br/>
          Something that should be mentioned is that there's a difference between animations and actions.<br/>
          Animations only have properties such as playback speed or movement (walking, sprinting, strafing, etc).<br/>
          On the other hand, actions are animations that can have multiple properties attached to them, such as sfx, vfx, etc.<br/>
          A raw punch animation alone won't actually hit the opponent or produce noise.</p>
        <p>There are files using the <strong>.cat</strong> extension inside the <strong>Act.img</strong> archive, which can be speculated to mean "Compiled/Compressed Action Tree"<br/>
        The source version of these files uses the <strong>.act</strong> extension instead, which stands for "Action Tree".<br>
        <u>They are generally not compatible across versions.</u> Things like audio IDs, savedata and camera FOV values differ, so be careful not to mix.</p>
        <p>Action trees are usually used as a way to represent the various possible actions that a ped can perform depending on the situation.<br/>
          These trees are made of action nodes, each one being a different action that a ped can do.<br/>
          All trees start from a root node and, from there, it starts to "branch" into more action nodes until they meet an end (just like a real life tree, hence the name). </p>
        <p>Action nodes tend to have conditions on them as a way to know if the ped should or should not use that action at the moment.</p>
        <em>
          <div style="font-size: small; float:left">Written by deadpoolXYZ. <br />Explanation of the Tree data structure in general: <a href="https://en.wikipedia.org/wiki/Tree_(data_structure)" target="blank">Tree (data structure), on Wikipedia</a>
          </div>
        </em>

        <h2>Action Tree File Structure Example</h2>
        <p>
          The hierarchy is <strong>Bank</strong> &gt; <strong>Node</strong>.<br>
          <strong>Banks</strong> are containers for Nodes. They can have Conditions (ConditionGroups) but not Tracks. By convention, the very first Bank should match the name of the file.<br>
          <strong>Nodes</strong> define the actual actions. They can have both Conditions and Tracks (what actually happens, like animations).<br>
          The format may get pretty long for more complex files, but it's something you'll have to bear with. The devs most likely had these auto-generated by some tool, as opposed to writing them by hand.
        </p>
        <p>
          It cannot be stressed enough how important it is to <strong>check the Debug Build's .act files</strong> and <strong>compare them to the decompiled .mact files</strong>!<br>A lot of learning is done via observation, since due to the nature of current tools:
          <ul>
            <li>parameters of every condition and track are not properly named (but can be fixed later).</li>
            <li>values of each parameter may differ in type. (E.g.; timeBegin is a float number in <strong>.act</strong>, but an hexadecimal in <strong>.mact</strong>)</li>
          </ul>
          Try it yourself by making sense of this simple <strong>.mact</strong> file, then switch to the <strong>.act</strong> file tab.<br>
        </p>

        <div class="code-tabs">
          <div class="code-tab-header">

        <p>Solution: <span class="spoiler">This plays an animation (1.3x speed, with a 0.2s blend-in and 0.1s blend-out) of the character stretching their shoulders, once, only on their right arm, and only if their model is that of Jimmy.</span></p>
        <p>
          Conditions can be combined using logical operators.<br>
          Supported ones are <strong>OR</strong> and <strong>NOT</strong>, and take a single parameter:
        </p>
        <div class="code-tabs">
          <div class="code-tab-header">
            <button class="tab-btn active" onclick="switchTab(event, 'mact-or')">.mact</button>
            <button class="tab-btn" onclick="switchTab(event, 'act-or')">.act</button>
          </div>
          <pre id="act-or" class="code-content">
          OR
          {
              breakpoint false
          }
          </pre>
          <pre id="mact-or" class="code-content active">
          OR
          {
              param00001 0x00000000
          }
          </pre>
        </div>
        <p>
          There is also a <strong>False</strong> condition, structured the same way, which prevents the node from being executed if present.
        </p>
        <hr />
        <h2>Tools:</h2>
        <p>marcdred's <a href="https://github.com/marcdred/bully-mact-tool/" target="blank">mact tool</a> allows for decompressing <strong>.cat</strong> files and compressing <strong>.mact</strong> files back to <strong>.cat</strong>.</p>
        <p>Inside the TEMPLATES folder are the names of the parameters for each type of condition and track. As you figure out the actual names of each, you can rename them and the tool will automatically use those names when decompiling. Similarly, you'll be able to use them in your own files instead of "param0000x" and such. This way, you'll be able to make sense of <strong>.mact</strong> files without needing to rely on the <strong>.act</strong> files as much!</p>
